name: package build

on:
  push:
    branches:
    - master
    tags:
    - v*
  pull_request:
    branches:
    - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - name: build linux outputs
      run: |
        sudo apt-get -y update
        sudo apt-get -y install build-essential \
                             cmake \
                             mesa-common-dev \
                             libgl1-mesa-dev \
                             libxkbcommon-dev \
                             libxkbcommon-x11-dev \
                             curl 
        curl -O https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 20
        sudo apt-get -y install llvm-20-dev libclang-20-dev
        export PATH=/usr/lib/llvm-20/bin:$PATH
        make
        echo UPLOAD_FILE=cutter-deps-linux-x86_64.tar.gz >> $GITHUB_ENV
        echo UPLOAD_ASSET_TYPE=application/gzip >> $GITHUB_ENV
    - uses: actions/upload-artifact@v7
      with:
        name: ${{ env.UPLOAD_FILE }}
        path: ${{ env.UPLOAD_FILE }}
    - name: Get release
      if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
      id: get_release
      uses: karliss/get-release@bee343636450eb2e9b85d9f1592d8d73c408dc74
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload release assets
      if: steps.get_release.outputs.upload_url != null
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ${{ env.UPLOAD_FILE }}
          asset_name: ${{ env.UPLOAD_FILE }}
          asset_content_type: ${{ env.UPLOAD_ASSET_TYPE }}
  build-windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: build windows ouptuts
      shell: cmd
      run: |
        pwd
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        where cl
        where python
        set MSYS2_PATH_TYPE=inherit
        C:/shells/msys2bash.cmd "./scripts/build_win.sh"

    - name: set windows outputs
      shell: bash
      run: |
        echo UPLOAD_FILE=cutter-deps-win-x86_64.tar.gz >> $GITHUB_ENV
        echo UPLOAD_ASSET_TYPE=application/gzip >> $GITHUB_ENV
    - uses: actions/upload-artifact@v7
      with:
        name: ${{ env.UPLOAD_FILE }}
        path: ${{ env.UPLOAD_FILE }}
    - name: Get release
      if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
      id: get_release
      uses: karliss/get-release@bee343636450eb2e9b85d9f1592d8d73c408dc74
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload release assets
      if: steps.get_release.outputs.upload_url != null
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ${{ env.UPLOAD_FILE }}
          asset_name: ${{ env.UPLOAD_FILE }}
          asset_content_type: ${{ env.UPLOAD_ASSET_TYPE }}
  build-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        name: [
              macos-x86_64,
              macos-arm64,
            ]
        include:
          - name: macos-x86_64
            os: macos-15-intel # Must be an x86_64 image: https://github.com/actions/runner-images#available-images
            arch: x86_64
          - name: macos-arm64
            os: macos-15
            arch: arm64
    steps:
    - uses: actions/checkout@v6
    - name: build macos
      run: |
        set -euo pipefail
        brew install llvm@20 ccache && brew link llvm@20
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          LLVM_PREFIX="$HOMEBREW_PREFIX/opt/llvm"
        else
          LLVM_PREFIX="/usr/local/opt/llvm"
        fi
        echo "###### Applications ######"
        ls /Applications
        echo "###### XCode Info ######"
        sudo xcode-select --reset
        export BUILD_SDK_PATH=$(xcrun --show-sdk-path)
        echo "$BUILD_SDK_PATH"
        echo "###### xcode-select Info ######"
        xcode-select -print-path
        echo "###### LLVM Info ######"
        which clang
        brew info llvm
        echo "###### Make ######"
        export MACOSX_DEPLOYMENT_TARGET=11.0
        export MIN_SUPPORTED_MACOSX_DEPLOYMENT_TARGET=11.0
        export CFLAGS=" -isysroot $BUILD_SDK_PATH "
        export CCFLAGS=" -isysroot $BUILD_SDK_PATH "
        export CXXFLAGS=" -isysroot $BUILD_SDK_PATH "
        make ARCH=${{ matrix.arch }}
        echo UPLOAD_FILE=cutter-deps-macos-${{ matrix.arch }}.tar.gz >> $GITHUB_ENV
        echo UPLOAD_ASSET_TYPE=application/gzip >> $GITHUB_ENV
    - uses: actions/upload-artifact@v7
      with:
        name: ${{ env.UPLOAD_FILE }}
        path: ${{ env.UPLOAD_FILE }}
    - name: Get release
      if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
      id: get_release
      uses: karliss/get-release@bee343636450eb2e9b85d9f1592d8d73c408dc74
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload release assets
      if: steps.get_release.outputs.upload_url != null
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ${{ env.UPLOAD_FILE }}
          asset_name: ${{ env.UPLOAD_FILE }}
          asset_content_type: ${{ env.UPLOAD_ASSET_TYPE }}
